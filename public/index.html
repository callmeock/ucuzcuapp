<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e63946" />
  <title>Ucuzcu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f6fa;
      color: #1f2937;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
      text-align: center;
    }
    .card { max-width: 20rem; }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      background: #e63946;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏷️</div>
    <h1>Ucuzcu</h1>
    <p>İnternet bağlantısı gerekli. Lütfen bağlantınızı kontrol edip tekrar deneyin.</p>
    <a href="https://ucuzcuapp.com">Yeniden Dene</a>
  </div>
</body>
</html>
